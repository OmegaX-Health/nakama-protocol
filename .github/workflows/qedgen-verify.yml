name: QEDGen Verify

on:
  pull_request:
    paths:
      - 'omegax_protocol.qedspec'
      - '.qed/**'
      - 'formal_verification/**'
      - 'programs/omegax_protocol/src/**'
      - 'programs/omegax_protocol/Cargo.toml'
      - 'scripts/run_qedgen.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/qedgen-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qedgen-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qedgen:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      QEDGEN_REF: v2.16.0
      KANI_VERSION: 0.67.0
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0

      - name: Install Lean
        shell: bash
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/lean" --version
          "$HOME/.elan/bin/lake" --version

      - name: Install Kani
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked kani-verifier --version "${KANI_VERSION}"
          cargo kani setup

      - name: Install QEDGen
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch "${QEDGEN_REF}" --depth 1 https://github.com/QEDGen/solana-skills.git /tmp/qedgen-solana-skills
          bash /tmp/qedgen-solana-skills/install.sh
          echo "QEDGEN=/tmp/qedgen-solana-skills/bin/qedgen" >> "$GITHUB_ENV"

      - name: Setup QEDGen mathlib
        run: "$QEDGEN" setup --mathlib

      - name: Check spec
        run: npm run qedgen:check

      - name: Regenerate verification artifacts
        run: npm run qedgen:codegen

      - name: Fail on generated drift
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            omegax_protocol.qedspec \
            formal_verification

      - name: Run generated backends
        run: npm run qedgen:verify

      - name: Reconcile spec, code, and proofs
        run: npm run qedgen:reconcile
